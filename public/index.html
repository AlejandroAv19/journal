<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal</title>
</head>
<body>
    <h1>Welcome to Journal</h1>
    <h2>A safe place for your thoughts</h2>
    <section id="form-section">
        <form id="entry-form">
            <label for="entry-user">Name:</label>
            <input id="entry-user" type="text" placeholder="Your name here"></input>
            <br>
            <textarea id="entry-text" placeholder="What are you thinking about?"></textarea>
            <br>
            <button type="submit">Publish</button>
        </form>
    </section>
    <section id="entries-section">
        <h2>Read other people's thoughts</h2>
        <div id="entries-container">
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
